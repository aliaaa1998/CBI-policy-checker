services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cbi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cbi"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/cbi
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
